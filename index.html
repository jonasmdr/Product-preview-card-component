<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Product preview card component</title>

  <link rel="stylesheet" href="design/style.css">
  <link rel="stylesheet" href="design/media-query.css">

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body onresize="changedsize()">
  <main>
    <article>
      <picture>
        <source
          media="(max-width:1440px)"
          srcset="images/image-product-mobile.jpg">
          
        <img id="image-perfume" src="images/image-product-desktop.jpg" alt="image of a perfume bottle">
      </picture>
      <section class="main-section">
        <section class="description-section">
          <p class="perfume">
            Perfume
          </p>
          <h1>
            Gabrielle Essence Eau De Parfum
          </h1>
          <p class="description">
            A floral, solar and voluptuous interpretation composed by Olivier Polge,
            Perfumer-Creator for the House of CHANEL.
          </p>
        </section>
        <div class="price-conteiner">
          <p class="discounted-price">
            $149.99
          </p>
          <p class="price">
            $169.99
          </p>
        </div>
        <button class="button-add-to-cart"><img src="images/icon-cart.svg" alt="car"> Add to Cart</button>
      </section>
    </article>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
